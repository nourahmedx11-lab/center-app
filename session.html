<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - فتح حصة</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .qr-box { text-align: center; padding: 10px 0; }
        #qrCode { margin: 20px auto; display: inline-block; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .student-row:last-child { border-bottom: none; }
        .present { color: #2e7d32; font-weight: 700; }
        .wa-btn { background: #25D366; color: white; border: none; border-radius: 8px; padding: 8px 15px; font-size: 13px; cursor: pointer; font-family: 'Cairo',sans-serif; font-weight: 600; text-decoration: none; display: inline-block; }
        .absent-name { color: #333; font-weight: 600; }
        .absent-phone { color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 فتح حصة</h1>
        <button class="header-btn" onclick="window.location.href='admin.html'">رجوع</button>
    </div>

    <div class="container">
        <div class="card" id="startCard" style="text-align:center">
            <h2 style="color:#333;margin-bottom:15px;font-size:18px">🎯 فتح حصة جديدة</h2>
            <p style="color:#888;font-size:14px;margin-bottom:20px">لما تفتح الحصة هيظهر QR Code ثابت طول الحصة</p>
            <button class="btn" onclick="startSession()">فتح الحصة ▶️</button>
        </div>

        <div id="qrContainer" class="card qr-box" style="display:none">
            <h2 style="color:#333;margin-bottom:10px;font-size:18px">📱 QR Code الحصة</h2>
            <div id="qrCode"></div>
            <div style="background:#f8f9ff;border-radius:10px;padding:12px;margin-top:15px;text-align:right">
                <p style="color:#555;font-size:13px">وقت البدء: <strong id="startTime" style="color:#6c63ff">-</strong></p>
            </div>
            <button class="btn" style="background:linear-gradient(135deg,#ff4444,#cc0000);margin-top:15px" onclick="endSession()">إنهاء الحصة ⏹️</button>
        </div>

        <div class="card" id="attendanceCard" style="display:none">
            <div class="card-title">✅ الحضور الآن</div>
            <div id="attendanceList"></div>
        </div>

        <div class="card" id="absenceCard" style="display:none">
            <div class="card-title">❌ الغايبين - تواصل مع أولياء الأمور</div>
            <div id="absenceList"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let sessionId = null;
        let attendedIds = [];

        window.startSession = async function() {
            const now = new Date();
            const sessionRef = await addDoc(collection(db, 'sessions'), {
                startTime: now.toISOString(),
                status: 'active',
                date: now.toLocaleDateString('ar-EG')
            });
            sessionId = sessionRef.id;
            document.getElementById('startTime').textContent = now.toLocaleTimeString('ar-EG');
            document.getElementById('qrContainer').style.display = 'block';
            document.getElementById('startCard').style.display = 'none';

            new QRCode(document.getElementById('qrCode'), {
                text: 'SESSION-' + sessionId,
                width: 220, height: 220,
                colorDark: '#6c63ff', colorLight: '#ffffff'
            });

            onSnapshot(query(collection(db, 'attendance'), where('sessionId', '==', sessionId)), (snap) => {
                const list = document.getElementById('attendanceList');
                const card = document.getElementById('attendanceCard');
                card.style.display = 'block';
                attendedIds = [];
                list.innerHTML = '';
                snap.forEach(d => {
                    const a = d.data();
                    attendedIds.push(a.studentId);
                    list.innerHTML += `<div class="student-row"><span class="present">✅ حاضر</span><span>${a.studentName}</span></div>`;
                });
                if (snap.empty) list.innerHTML = '<div class="empty">مفيش حد مسح لحد دلوقتي</div>';
            });
        }

        window.endSession = async function() {
            if (sessionId) await updateDoc(doc(db, 'sessions', sessionId), { status: 'ended' });
            document.getElementById('qrContainer').style.display = 'none';

            const studentsSnap = await getDocs(query(collection(db, 'students'), where('status', '==', 'approved')));
            const absenceCard = document.getElementById('absenceCard');
            const absenceList = document.getElementById('absenceList');
            absenceCard.style.display = 'block';
            absenceList.innerHTML = '';
            let absentCount = 0;

            studentsSnap.forEach(d => {
                const s = d.data();
                if (!attendedIds.includes(d.id)) {
                    absentCount++;
                    const phone = s.parentPhone.replace(/^0/, '20');
                    const msg = encodeURIComponent(`عزيزي ولي أمر ${s.name}، نفيدكم بأن ${s.name} لم يحضر حصة اليوم. للاستفسار تواصلوا مع المدرس.`);
                    absenceList.innerHTML += `
                        <div class="student-row">
                            <a class="wa-btn" href="https://wa.me/${phone}?text=${msg}" target="_blank">📱 واتساب</a>
                            <div>
                                <div class="absent-name">${s.name}</div>
                                <div class="absent-phone">${s.parentPhone}</div>
                            </div>
                        </div>`;
                }
            });

            if (absentCount === 0) absenceList.innerHTML = '<p style="color:#2e7d32;text-align:center;padding:20px;font-weight:700">🎉 الكل حضر!</p>';
        }
    </script>
</body>
</html>
