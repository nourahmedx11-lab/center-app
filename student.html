<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - بروفايل الطالب</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-card {
            text-align: center;
            padding: 30px 20px;
        }
        .student-name {
            font-size: 22px;
            font-weight: 800;
            margin: 10px 0 5px;
        }
        .student-phone {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .score-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .score-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }
        .score-num {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c63ff, #11998e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .score-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 سنتر</h1>
        <button class="header-btn" onclick="logout()">خروج</button>
    </div>

    <div class="container">
        <div class="card welcome-card">
            <div class="avatar">👤</div>
            <div class="student-name" id="studentName">جاري التحميل...</div>
            <div class="student-phone" id="studentPhone"></div>
            <span class="badge badge-success" style="margin-top:10px;display:inline-block">✅ طالب مقبول</span>
            <div class="score-grid">
                <div class="score-item">
                    <div class="score-num" id="totalLessons">0</div>
                    <div class="score-label">الحصص</div>
                </div>
                <div class="score-item">
                    <div class="score-num" id="attended">0</div>
                    <div class="score-label">حضر</div>
                </div>
                <div class="score-item">
                    <div class="score-num" id="absent">0</div>
                    <div class="score-label">غاب</div>
                </div>
            </div>
        </div>

        <div class="actions-grid">
            <a class="action-btn" href="scan.html">
                <div class="icon">📱</div>
                <div class="title">تسجيل الحضور</div>
                <div class="sub">امسح QR الحصة</div>
            </a>
            <a class="action-btn" href="take-exam.html">
                <div class="icon">📝</div>
                <div class="title">الاختبارات</div>
                <div class="sub">حل الاختبارات</div>
            </a>
            <a class="action-btn" href="receipt.html">
                <div class="icon">💰</div>
                <div class="title">رفع إيصال</div>
                <div class="sub">إيصال الدفع</div>
            </a>
            <a class="action-btn" href="#">
                <div class="icon">📊</div>
                <div class="title">تقاريري</div>
                <div class="sub">قريباً</div>
            </a>
        </div>

        <div class="card">
            <div class="card-title">📋 بياناتي</div>
            <div class="info-row">
                <span class="label">الاسم</span>
                <span class="value" id="infoName">-</span>
            </div>
            <div class="info-row">
                <span class="label">رقم موبايلي</span>
                <span class="value" id="infoPhone">-</span>
            </div>
            <div class="info-row">
                <span class="label">رقم ولي الأمر</span>
                <span class="value" id="infoParent">-</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">💰 حالة الدفع</div>
            <div class="info-row">
                <span class="label">شهر أبريل</span>
                <span class="value" id="paymentStatus"><span class="badge badge-danger">لم يدفع</span></span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📝 الاختبارات</div>
            <div id="examResults"><div class="empty">مفيش اختبارات لحد دلوقتي</div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const student = JSON.parse(localStorage.getItem('student'));
        if (!student) window.location.href = 'login.html';

        document.getElementById('studentName').textContent = student.name;
        document.getElementById('studentPhone').textContent = student.phone;
        document.getElementById('infoName').textContent = student.name;
        document.getElementById('infoPhone').textContent = student.phone;
        document.getElementById('infoParent').textContent = student.parentPhone;

        const month = new Date().toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
        const receipts = await getDocs(query(collection(db, 'receipts'), where('studentId', '==', student.id)));
        receipts.forEach(d => {
            const r = d.data();
            if (r.month === month) {
                const status = r.status === 'confirmed' ?
                    '<span class="badge badge-success">✅ دفع</span>' :
                    '<span class="badge badge-warning">⏳ في الانتظار</span>';
                document.getElementById('paymentStatus').innerHTML = status;
            }
        });

        const attendance = await getDocs(query(collection(db, 'attendance'), where('studentId', '==', student.id)));
        const sessions = await getDocs(collection(db, 'sessions'));
        document.getElementById('totalLessons').textContent = sessions.size;
        document.getElementById('attended').textContent = attendance.size;
        document.getElementById('absent').textContent = Math.max(0, sessions.size - attendance.size);

        const examResults = await getDocs(query(collection(db, 'examResults'), where('studentId', '==', student.id)));
        const examDiv = document.getElementById('examResults');
        if (!examResults.empty) {
            examDiv.innerHTML = '';
            examResults.forEach(d => {
                const r = d.data();
                examDiv.innerHTML += `
                    <div class="info-row">
                        <span class="badge badge-primary">${r.score}/${r.totalMarks}</span>
                        <span class="label">${r.examTitle}</span>
                    </div>`;
            });
        }

        window.logout = function() {
            localStorage.removeItem('student');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
