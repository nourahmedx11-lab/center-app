<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - تسجيل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 70%);
        }
        .register-box { width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 50px; margin-bottom: 10px; display: block; }
        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c63ff, #11998e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 5px; }
        .login-link { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 14px; }
        .login-link a { color: #6c63ff; text-decoration: none; font-weight: 700; }
        label { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 5px; display: block; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <h1>سنتر</h1>
            <p>سجل بياناتك للانضمام</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>الاسم بالكامل</label>
                <input type="text" id="name" placeholder="أدخل اسمك">
            </div>
            <div class="form-group">
                <label>رقم موبايلك</label>
                <input type="tel" id="phone" placeholder="01xxxxxxxxx">
            </div>
            <div class="form-group">
                <label>رقم موبايل ولي الأمر</label>
                <input type="tel" id="parentPhone" placeholder="01xxxxxxxxx">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="اختار كلمة مرور">
            </div>
            <button class="btn" id="registerBtn" onclick="register()">تسجيل 🚀</button>
            <div id="msg"></div>
        </div>

        <div class="login-link">
            عندك حساب؟ <a href="login.html">سجل دخول</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.register = async function() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const parentPhone = document.getElementById('parentPhone').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('msg');

            if (!name || !phone || !parentPhone || !password) {
                msg.className = 'msg msg-error';
                msg.textContent = '❌ من فضلك املأ كل البيانات';
                return;
            }

            if (phone.length < 11) {
                msg.className = 'msg msg-error';
                msg.textContent = '❌ رقم الموبايل غلط';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'جاري التسجيل...';

            try {
                const q = query(collection(db, 'students'), where('phone', '==', phone));
                const existing = await getDocs(q);

                if (!existing.empty) {
                    msg.className = 'msg msg-error';
                    msg.textContent = '❌ الرقم ده مسجل قبل كده!';
                    btn.disabled = false;
                    btn.textContent = 'تسجيل 🚀';
                    return;
                }

                await addDoc(collection(db, 'students'), {
                    name, phone, parentPhone, password,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });

                msg.className = 'msg msg-success';
                msg.textContent = '✅ تم التسجيل! في انتظار موافقة المدرس';
                btn.textContent = 'تم التسجيل ✅';

            } catch (error) {
                msg.className = 'msg msg-error';
                msg.textContent = 'حصل خطأ، حاول تاني';
                btn.disabled = false;
                btn.textContent = 'تسجيل 🚀';
            }
        }
    </script>
</body>
</html>
