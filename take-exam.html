<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - الاختبارات</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .exam-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .exam-item:last-child { border-bottom: none; }
        .exam-title { color: #333; font-size: 15px; font-weight: 700; }
        .exam-date { color: #888; font-size: 12px; margin-top: 3px; }
        .btn-start { padding: 10px 20px; background: linear-gradient(135deg, #6c63ff, #5a52d5); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Cairo',sans-serif; }
        .btn-done { padding: 10px 20px; background: #e8f5e9; color: #2e7d32; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; font-family: 'Cairo',sans-serif; }
        .question-card { background: #f8f9ff; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 2px solid #e8e8f0; }
        .question-text { color: #333; font-size: 16px; font-weight: 700; margin-bottom: 15px; }
        .option { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border: 2px solid #e8e8f0; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; background: white; }
        .option:hover { border-color: #6c63ff; background: #f8f9ff; }
        .option.selected { border-color: #6c63ff; background: #ede7f6; }
        .option.correct { border-color: #2e7d32; background: #e8f5e9; }
        .option.wrong { border-color: #c62828; background: #ffebee; }
        .option-letter { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #5a52d5); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
        .option-text { color: #333; font-size: 14px; }
        .result-card { text-align: center; padding: 30px; }
        .result-score { font-size: 52px; font-weight: 800; background: linear-gradient(135deg, #6c63ff, #11998e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; }
        .result-msg { color: #555; font-size: 16px; }
        #examView { display: none; }
        #resultView { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 الاختبارات</h1>
        <button class="header-btn" onclick="goBack()">رجوع</button>
    </div>

    <div class="container">
        <div id="listView">
            <div class="card">
                <div class="card-title">📋 الاختبارات المتاحة</div>
                <div id="examsList"></div>
            </div>
        </div>

        <div id="examView">
            <div class="card">
                <h2 id="examTitleDisplay" style="color:#333;margin-bottom:5px;font-size:18px"></h2>
                <p id="examInfo" style="color:#888;font-size:13px;margin-bottom:20px"></p>
                <div id="questionsDisplay"></div>
                <button class="btn" onclick="submitExam()">تسليم الاختبار 📤</button>
            </div>
        </div>

        <div id="resultView">
            <div class="card result-card">
                <div style="font-size:52px">🎉</div>
                <h2 style="color:#333;margin:10px 0">انتهى الاختبار!</h2>
                <div class="result-score" id="resultScore"></div>
                <p class="result-msg" id="resultMsg"></p>
                <button class="btn" style="margin-top:20px" onclick="window.location.href='student.html'">رجوع للبروفايل</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = JSON.parse(localStorage.getItem('student'));
        if (!student) window.location.href = 'login.html';

        let currentExam = null;
        let answers = {};

        window.goBack = function() {
            if (document.getElementById('examView').style.display === 'block') {
                document.getElementById('examView').style.display = 'none';
                document.getElementById('listView').style.display = 'block';
            } else {
                window.location.href = 'student.html';
            }
        }

        async function loadExams() {
            const list = document.getElementById('examsList');
            const snap = await getDocs(query(collection(db, 'exams'), where('status', '==', 'active')));
            const doneSnap = await getDocs(query(collection(db, 'examResults'), where('studentId', '==', student.id)));
            const doneIds = doneSnap.docs.map(d => d.data().examId);

            list.innerHTML = '';
            let count = 0;

            snap.forEach(d => {
                count++;
                const e = d.data();
                const isDone = doneIds.includes(d.id);
                const date = new Date(e.createdAt).toLocaleDateString('ar-EG');
                list.innerHTML += `
                    <div class="exam-item">
                        <div>
                            <div class="exam-title">${e.title}</div>
                            <div class="exam-date">📅 ${date} | 📊 ${e.totalMarks} درجة</div>
                        </div>
                        ${isDone ? `<button class="btn-done">✅ تم</button>` : `<button class="btn-start" onclick="startExam('${d.id}')">ابدأ</button>`}
                    </div>`;
            });

            if (count === 0) list.innerHTML = '<div class="empty">مفيش اختبارات متاحة دلوقتي</div>';
        }

        window.startExam = async function(examId) {
            const snap = await getDocs(collection(db, 'exams'));
            snap.forEach(d => { if (d.id === examId) currentExam = { id: d.id, ...d.data() }; });
            if (!currentExam) return;
            answers = {};

            document.getElementById('listView').style.display = 'none';
            document.getElementById('examView').style.display = 'block';
            document.getElementById('examTitleDisplay').textContent = currentExam.title;
            document.getElementById('examInfo').textContent = `عدد الأسئلة: ${currentExam.questions.length} | الدرجة الكاملة: ${currentExam.totalMarks}`;

            const container = document.getElementById('questionsDisplay');
            const letters = ['أ','ب','ج','د'];
            container.innerHTML = '';

            currentExam.questions.forEach((q, qi) => {
                container.innerHTML += `
                    <div class="question-card">
                        <div class="question-text">${qi + 1}. ${q.qtext}</div>
                        ${q.options.map((opt, oi) => `
                            <div class="option" id="opt_${qi}_${oi}" onclick="selectOption(${qi}, ${oi})">
                                <div class="option-letter">${letters[oi]}</div>
                                <div class="option-text">${opt}</div>
                            </div>`).join('')}
                    </div>`;
            });
        }

        window.selectOption = function(qi, oi) {
            currentExam.questions[qi].options.forEach((_, i) => {
                const el = document.getElementById(`opt_${qi}_${i}`);
                if (el) el.classList.remove('selected');
            });
            const el = document.getElementById(`opt_${qi}_${oi}`);
            if (el) el.classList.add('selected');
            answers[qi] = oi;
        }

        window.submitExam = async function() {
            if (Object.keys(answers).length < currentExam.questions.length) {
                alert('من فضلك أجب على كل الأسئلة!');
                return;
            }

            let correct = 0;
            currentExam.questions.forEach((q, qi) => { if (answers[qi] === q.correct) correct++; });
            const score = Math.round((correct / currentExam.questions.length) * currentExam.totalMarks);

            await addDoc(collection(db, 'examResults'), {
                studentId: student.id, studentName: student.name,
                examId: currentExam.id, examTitle: currentExam.title,
                score, totalMarks: currentExam.totalMarks,
                correct, total: currentExam.questions.length,
                submittedAt: new Date().toISOString()
            });

            document.getElementById('examView').style.display = 'none';
            document.getElementById('resultView').style.display = 'block';
            document.getElementById('resultScore').textContent = `${score} / ${currentExam.totalMarks}`;

            const percent = (correct / currentExam.questions.length) * 100;
            document.getElementById('resultMsg').textContent = percent >= 80 ? '🌟 ممتاز! أحسنت' : percent >= 60 ? '👍 جيد! استمر' : '📚 تحتاج مراجعة أكثر';
        }

        loadExams();
    </script>
</body>
</html>
