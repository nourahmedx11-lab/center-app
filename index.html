<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - تسجيل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#090910;--surf:#111118;--surf2:#1a1a26;--bord:rgba(255,255,255,0.08);--acc:#a78bfa;--teal:#11998e;--purple:#7c6fcd;--grn:#34d399;--red:#f87171;--txt:#eeeef8;--mut:rgba(238,238,248,0.45)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,111,205,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,111,205,0.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
        .box{width:100%;max-width:440px;position:relative;z-index:1}
        .logo{text-align:center;margin-bottom:24px}
        .logo-icon{font-size:46px;display:block;margin-bottom:8px;animation:p 2s infinite}
        @keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .logo h1{font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo p{color:var(--mut);font-size:13px;margin-top:4px}
        .card{background:var(--surf);border:1px solid var(--bord);border-radius:16px;padding:22px}
        .fg{margin-bottom:13px}
        label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:5px}
        input{width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:11px 14px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .2s}
        input:focus{border-color:rgba(167,139,250,0.5)}
        input::placeholder{color:var(--mut)}
        input.ef{border-color:rgba(248,113,113,0.6)!important}
        .grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
        .go{background:var(--surf2);border:1.5px solid var(--bord);border-radius:11px;padding:13px 6px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
        .go:hover{border-color:rgba(167,139,250,0.4)}
        .go.sel{background:rgba(124,111,205,0.12);border-color:var(--acc)}
        .go .gn{font-size:24px;font-weight:900;color:var(--mut);display:block}
        .go.sel .gn{color:var(--acc)}
        .go .gl{font-size:10px;color:var(--mut);margin-top:2px}
        .go.sel .gl{color:var(--acc)}
        .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--purple),var(--teal));color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s}
        .btn:hover{opacity:.88}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .hint{font-size:11px;margin-top:4px;color:var(--mut)}
        .hint.bad{color:var(--red)}.hint.good{color:var(--grn)}
        .msg{margin-top:10px;font-size:12px;padding:9px 13px;border-radius:9px;display:none;line-height:1.5}
        .msg.ok{background:rgba(52,211,153,.1);color:var(--grn);display:block}
        .msg.err{background:rgba(248,113,113,.1);color:var(--red);display:block}
        .foot{text-align:center;margin-top:18px;font-size:13px;color:var(--mut)}
        .foot a{color:var(--acc);text-decoration:none;font-weight:700}
    </style>
</head>
<body>
<div class="box">
    <div class="logo"><span class="logo-icon">📚</span><h1>سنتر</h1><p>سجل بياناتك للانضمام</p></div>
    <div class="card">
        <label>اختار صفك الدراسي</label>
        <div class="grade-grid">
            <div class="go sel" onclick="sg(1,this)"><span class="gn">١</span><span class="gl">أول ثانوي</span></div>
            <div class="go" onclick="sg(2,this)"><span class="gn">٢</span><span class="gl">ثاني ثانوي</span></div>
            <div class="go" onclick="sg(3,this)"><span class="gn">٣</span><span class="gl">ثالث ثانوي</span></div>
        </div>
        <div class="fg">
            <label>الاسم بالكامل (رباعي)</label>
            <input type="text" id="name" placeholder="مثال: محمد أحمد علي حسن" oninput="cn()">
            <div class="hint" id="nh">الاسم لازم يكون 4 كلمات على الأقل</div>
        </div>
        <div class="fg"><label>رقم موبايلك</label><input type="tel" id="phone" placeholder="01xxxxxxxxx" maxlength="11"></div>
        <div class="fg"><label>رقم موبايل ولي الأمر</label><input type="tel" id="pphone" placeholder="01xxxxxxxxx" maxlength="11"></div>
        <div class="fg"><label>كلمة المرور</label><input type="password" id="pwd" placeholder="6 أحرف على الأقل"></div>
        <button class="btn" id="rb" onclick="reg()">تسجيل 🚀</button>
        <div class="msg" id="msg"></div>
    </div>
    <div class="foot">عندك حساب؟ <a href="login.html">سجل دخول</a></div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,query,where,getDocs}from"https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",authDomain:"center-app-30dc9.firebaseapp.com",projectId:"center-app-30dc9",storageBucket:"center-app-30dc9.firebasestorage.app",messagingSenderId:"407314952817",appId:"1:407314952817:web:fea2ab6f43e8250a34a1d0"};
const app=initializeApp(cfg);const db=getFirestore(app);
async function hp(p){const e=new TextEncoder().encode(p);const b=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
let grade=1;
window.sg=function(g,el){grade=g;document.querySelectorAll('.go').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
window.cn=function(){
    const v=document.getElementById('name').value.trim();
    const w=v.split(/\s+/).filter(x=>x.length>0);
    const h=document.getElementById('nh');const i=document.getElementById('name');
    if(!v){h.className='hint';h.textContent='الاسم لازم يكون 4 كلمات على الأقل';i.classList.remove('ef');}
    else if(w.length<4){h.className='hint bad';h.textContent='❌ أدخلت '+w.length+' كلمة — لازم 4 كلمات';i.classList.add('ef');}
    else{h.className='hint good';h.textContent='✅ الاسم صح';i.classList.remove('ef');}
}
function sm(t,x){const e=document.getElementById('msg');e.className='msg '+t;e.textContent=x;}
window.reg=async function(){
    const name=document.getElementById('name').value.trim();
    const phone=document.getElementById('phone').value.trim();
    const pp=document.getElementById('pphone').value.trim();
    const pwd=document.getElementById('pwd').value.trim();
    const btn=document.getElementById('rb');
    const words=name.split(/\s+/).filter(x=>x.length>0);
    if(words.length<4){sm('err','❌ الاسم لازم يكون 4 كلمات (اسم رباعي) — أدخلت '+words.length+' كلمة');document.getElementById('name').focus();return;}
    if(!phone||phone.length<11){sm('err','❌ رقم الموبايل لازم يكون 11 رقم');return;}
    if(!pp||pp.length<11){sm('err','❌ رقم ولي الأمر لازم يكون 11 رقم');return;}
    if(pwd.length<6){sm('err','❌ كلمة المرور لازم تكون 6 أحرف على الأقل');return;}
    btn.disabled=true;btn.textContent='جاري التسجيل...';
    try{
        const q=query(collection(db,'students'),where('phone','==',phone));
        const ex=await getDocs(q);
        if(!ex.empty){sm('err','❌ الرقم ده مسجل قبل كده!');btn.disabled=false;btn.textContent='تسجيل 🚀';return;}
        const h=await hp(pwd);
        await addDoc(collection(db,'students'),{name,phone,parentPhone:pp,password:h,grade,status:'pending',createdAt:new Date().toISOString()});
        sm('ok','✅ تم التسجيل! في انتظار موافقة المدرس على حسابك');
        btn.textContent='تم ✅';
        setTimeout(()=>window.location.href='login.html',2500);
    }catch(e){sm('err','❌ حصل خطأ، حاول تاني');btn.disabled=false;btn.textContent='تسجيل 🚀';}
}
</script>
</body>
</html>
