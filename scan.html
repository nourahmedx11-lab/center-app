<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - تسجيل الحضور</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .scan-box { width: 100%; max-width: 420px; text-align: center; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .scan-title { font-size: 24px; font-weight: 800; color: #6c63ff; margin-bottom: 10px; }
        .scan-sub { color: #888; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="scan-box">
        <div class="card">
            <div class="scan-title">📱 تسجيل الحضور</div>
            <div class="scan-sub">وجّه الكاميرا على QR Code الحصة</div>
            <div id="reader"></div>
            <div id="msg"></div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = JSON.parse(localStorage.getItem('student'));
        if (!student) window.location.href = 'login.html';

        const CENTER_LAT = 30.0444;
        const CENTER_LNG = 31.2357;
        const MAX_DISTANCE = 500;

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        let scanner = new Html5QrcodeScanner('reader', { fps: 10, qrbox: 250 });

        scanner.render(async (code) => {
            scanner.clear();
            const msg = document.getElementById('msg');

            if (!code.startsWith('SESSION-')) {
                msg.className = 'msg msg-error';
                msg.textContent = '❌ QR Code غلط!';
                return;
            }

            msg.className = 'msg msg-warning';
            msg.textContent = '📍 جاري التحقق من موقعك...';

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const dist = getDistance(pos.coords.latitude, pos.coords.longitude, CENTER_LAT, CENTER_LNG);

                if (dist > MAX_DISTANCE) {
                    msg.className = 'msg msg-error';
                    msg.textContent = `❌ أنت بعيد عن السنتر (${Math.round(dist)} متر)`;
                    await addDoc(collection(db, 'cheatAttempts'), {
                        studentId: student.id, studentName: student.name,
                        distance: Math.round(dist), time: new Date().toISOString()
                    });
                    return;
                }

                const sessionId = code.replace('SESSION-', '');
                const existing = await getDocs(query(collection(db, 'attendance'), where('sessionId', '==', sessionId), where('studentId', '==', student.id)));

                if (!existing.empty) {
                    msg.className = 'msg msg-warning';
                    msg.textContent = '⚠️ أنت سجلت حضورك قبل كده!';
                    return;
                }

                await addDoc(collection(db, 'attendance'), {
                    sessionId, studentId: student.id, studentName: student.name,
                    time: new Date().toISOString(),
                    lat: pos.coords.latitude, lng: pos.coords.longitude
                });

                msg.className = 'msg msg-success';
                msg.textContent = '✅ تم تسجيل حضورك بنجاح!';

            }, () => {
                msg.className = 'msg msg-error';
                msg.textContent = '❌ لازم تسمح بالموقع عشان تسجل حضورك!';
            });
        });
    </script>
</body>
</html>
