<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - لوحة المدرس</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .student-card { display: flex; justify-content: space-between; align-items: center; }
        .student-info h3 { color: #333; font-size: 16px; margin-bottom: 5px; }
        .student-info p { color: #888; font-size: 13px; margin-bottom: 3px; }
        .btn-approve {
            padding: 10px 18px;
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .btn-reject {
            padding: 10px 18px;
            background: #ffebee;
            color: #c62828;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-right: 8px;
        }
        .btn-confirm {
            padding: 10px 18px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-right: 8px;
        }
        .receipt-card img { width: 100%; border-radius: 10px; margin: 15px 0; }
        .receipt-info p { color: #555; font-size: 14px; margin-bottom: 5px; }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .result-row:last-child { border-bottom: none; }
        .score { font-weight: 700; color: #6c63ff; }
        .session-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 لوحة المدرس</h1>
        <span style="color:white;font-size:13px">مرحباً بك</span>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="btn-students" onclick="showSection('students')">👥 الطلاب</button>
        <button class="nav-btn" id="btn-receipts" onclick="showSection('receipts')">💰 الإيصالات</button>
        <button class="nav-btn" id="btn-exams" onclick="showSection('exams')">📝 الاختبارات</button>
        <button class="nav-btn" id="btn-session" onclick="showSection('session')">📱 فتح حصة</button>
    </div>

    <div class="container">
        <div class="section active" id="students">
            <div class="card">
                <div class="card-title">⏳ الطلاب المنتظرون الموافقة</div>
                <div id="pendingList"></div>
            </div>
            <div class="card">
                <div class="card-title">✅ الطلاب المقبولون</div>
                <div id="approvedList"></div>
            </div>
        </div>

        <div class="section" id="receipts">
            <div class="card">
                <div class="card-title">💰 إيصالات الدفع</div>
                <div id="receiptsList"></div>
            </div>
        </div>

        <div class="section" id="exams">
            <div class="card">
                <button class="session-btn" onclick="window.location.href='exam.html'">➕ إنشاء اختبار جديد</button>
            </div>
            <div class="card">
                <div class="card-title">📊 نتائج الطلاب</div>
                <div id="examResultsList"></div>
            </div>
        </div>

        <div class="section" id="session">
            <div class="card" style="text-align:center">
                <h2 style="color:#333;margin-bottom:15px">🎯 فتح حصة جديدة</h2>
                <button class="session-btn" onclick="window.location.href='session.html'">فتح الحصة ▶️</button>
            </div>
        </div>
    </div>

    <style>
        .section { display: none; }
        .section.active { display: block; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showSection = function(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if (name === 'receipts') loadReceipts();
            if (name === 'students') loadStudents();
            if (name === 'exams') loadExams();
        }

        async function loadStudents() {
            const pendingList = document.getElementById('pendingList');
            const approvedList = document.getElementById('approvedList');
            pendingList.innerHTML = '<p style="text-align:center;color:#888;padding:20px">جاري التحميل...</p>';
            approvedList.innerHTML = '';

            const snapshot = await getDocs(collection(db, 'students'));
            let pendingCount = 0, approvedCount = 0;
            pendingList.innerHTML = '';

            snapshot.forEach(docSnap => {
                const s = docSnap.data();
                const id = docSnap.id;

                if (s.status === 'pending') {
                    pendingCount++;
                    pendingList.innerHTML += `
                        <div class="student-card" style="padding:15px 0;border-bottom:1px solid #f0f0f0">
                            <div class="student-info">
                                <h3>${s.name}</h3>
                                <p>📱 ${s.phone}</p>
                                <p>👨‍👦 ${s.parentPhone}</p>
                                <span class="badge badge-warning">في الانتظار</span>
                            </div>
                            <div>
                                <button class="btn-reject" onclick="rejectStudent('${id}')">رفض</button>
                                <button class="btn-approve" onclick="approveStudent('${id}')">قبول ✅</button>
                            </div>
                        </div>`;
                } else if (s.status === 'approved') {
                    approvedCount++;
                    approvedList.innerHTML += `
                        <div class="student-card" style="padding:15px 0;border-bottom:1px solid #f0f0f0">
                            <div class="student-info">
                                <h3>${s.name}</h3>
                                <p>📱 ${s.phone}</p>
                                <span class="badge badge-success">مقبول</span>
                            </div>
                        </div>`;
                }
            });

            if (pendingCount === 0) pendingList.innerHTML = '<div class="empty">مفيش طلاب في الانتظار 🎉</div>';
            if (approvedCount === 0) approvedList.innerHTML = '<div class="empty">مفيش طلاب مقبولين لسه</div>';
        }

        async function loadReceipts() {
            const list = document.getElementById('receiptsList');
            list.innerHTML = '<p style="text-align:center;color:#888;padding:20px">جاري التحميل...</p>';

            const snapshot = await getDocs(collection(db, 'receipts'));
            list.innerHTML = '';
            let count = 0;

            snapshot.forEach(docSnap => {
                const r = docSnap.data();
                const id = docSnap.id;
                count++;
                list.innerHTML += `
                    <div class="receipt-card" style="padding:15px 0;border-bottom:1px solid #f0f0f0">
                        <div class="receipt-info">
                            <p><strong>الاسم:</strong> ${r.studentName}</p>
                            <p><strong>الشهر:</strong> ${r.month}</p>
                            <p><strong>الحالة:</strong> ${r.status === 'pending' ? '⏳ في الانتظار' : r.status === 'confirmed' ? '✅ مؤكد' : '❌ مرفوض'}</p>
                        </div>
                        <img src="${r.image}" alt="إيصال">
                        ${r.status === 'pending' ? `
                        <div>
                            <button class="btn-reject" onclick="rejectReceipt('${id}')">رفض</button>
                            <button class="btn-confirm" onclick="confirmReceipt('${id}')">تأكيد ✅</button>
                        </div>` : ''}
                    </div>`;
            });

            if (count === 0) list.innerHTML = '<div class="empty">مفيش إيصالات لحد دلوقتي</div>';
        }

        async function loadExams() {
            const list = document.getElementById('examResultsList');
            list.innerHTML = '<p style="text-align:center;color:#888;padding:20px">جاري التحميل...</p>';

            const results = await getDocs(collection(db, 'examResults'));
            list.innerHTML = '';

            if (results.empty) {
                list.innerHTML = '<div class="empty">مفيش نتائج لحد دلوقتي</div>';
                return;
            }

            results.forEach(d => {
                const r = d.data();
                list.innerHTML += `
                    <div class="result-row">
                        <span class="score">${r.score}/${r.totalMarks}</span>
                        <span style="color:#333">${r.examTitle}</span>
                        <span style="color:#6c63ff;font-weight:600">${r.studentName}</span>
                    </div>`;
            });
        }

        window.approveStudent = async function(id) {
            await updateDoc(doc(db, 'students', id), { status: 'approved' });
            loadStudents();
        }
        window.rejectStudent = async function(id) {
            await updateDoc(doc(db, 'students', id), { status: 'rejected' });
            loadStudents();
        }
        window.confirmReceipt = async function(id) {
            await updateDoc(doc(db, 'receipts', id), { status: 'confirmed' });
            loadReceipts();
        }
        window.rejectReceipt = async function(id) {
            await updateDoc(doc(db, 'receipts', id), { status: 'rejected' });
            loadReceipts();
        }

        loadStudents();
    </script>
</body>
</html>
