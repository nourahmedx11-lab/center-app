<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنتر - إنشاء اختبار</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .question-card {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #e8e8f0;
        }
        .question-card h3 { color: #333; font-size: 15px; margin-bottom: 15px; }
        .option-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .option-row input[type="text"] { margin-bottom: 0; flex: 1; }
        .option-row input[type="radio"] { width: auto; margin-bottom: 0; }
        .option-label { color: #6c63ff; font-weight: 700; font-size: 14px; white-space: nowrap; }
        label { color: #555; font-size: 13px; margin-bottom: 5px; display: block; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 إنشاء اختبار</h1>
        <button class="header-btn" onclick="window.location.href='admin.html'">رجوع</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">📋 بيانات الاختبار</div>
            <label>عنوان الاختبار</label>
            <input type="text" id="examTitle" placeholder="مثال: اختبار الأسبوع الأول">
            <label>الدرجة الكاملة</label>
            <input type="number" id="totalMarks" placeholder="مثال: 10" value="10">
        </div>

        <div id="questionsContainer"></div>

        <div class="card">
            <button class="btn btn-outline" onclick="addQuestion()">➕ إضافة سؤال</button>
            <button class="btn btn-green" onclick="saveExam()">💾 حفظ الاختبار</button>
            <div id="msg"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLANIAa-Wrrco3E3vYhr79RFYHqzvepXo",
            authDomain: "center-app-30dc9.firebaseapp.com",
            projectId: "center-app-30dc9",
            storageBucket: "center-app-30dc9.firebasestorage.app",
            messagingSenderId: "407314952817",
            appId: "1:407314952817:web:fea2ab6f43e8250a34a1d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let questionCount = 0;

        window.addQuestion = function() {
            questionCount++;
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="card question-card" id="q${questionCount}">
                    <h3>سؤال ${questionCount}</h3>
                    <label>نص السؤال</label>
                    <input type="text" id="qtext${questionCount}" placeholder="اكتب السؤال هنا">
                    <label style="margin-top:10px">الاختيارات (✓ على الإجابة الصحيحة)</label>
                    ${['أ','ب','ج','د'].map((letter, i) => `
                        <div class="option-row">
                            <input type="radio" name="correct${questionCount}" value="${i}">
                            <span class="option-label">${letter}</span>
                            <input type="text" id="opt${questionCount}_${i}" placeholder="الاختيار ${letter}">
                        </div>`).join('')}
                </div>`;
            container.appendChild(div.firstElementChild);
        }

        window.saveExam = async function() {
            const title = document.getElementById('examTitle').value.trim();
            const totalMarks = parseInt(document.getElementById('totalMarks').value);
            const msg = document.getElementById('msg');

            if (!title) { msg.className = 'msg msg-error'; msg.textContent = 'من فضلك اكتب عنوان الاختبار'; return; }
            if (questionCount === 0) { msg.className = 'msg msg-error'; msg.textContent = 'من فضلك أضف سؤال واحد على الأقل'; return; }

            const questions = [];
            for (let i = 1; i <= questionCount; i++) {
                const qtext = document.getElementById(`qtext${i}`)?.value.trim();
                const correct = document.querySelector(`input[name="correct${i}"]:checked`)?.value;
                const options = [0,1,2,3].map(j => document.getElementById(`opt${i}_${j}`)?.value.trim());
                if (!qtext || correct === undefined) { msg.className = 'msg msg-error'; msg.textContent = `من فضلك أكمل السؤال ${i}`; return; }
                questions.push({ qtext, options, correct: parseInt(correct) });
            }

            try {
                await addDoc(collection(db, 'exams'), { title, totalMarks, questions, createdAt: new Date().toISOString(), status: 'active' });
                msg.className = 'msg msg-success';
                msg.textContent = '✅ تم حفظ الاختبار بنجاح!';
                setTimeout(() => window.location.href = 'admin.html', 1500);
            } catch (error) {
                msg.className = 'msg msg-error';
                msg.textContent = 'حصل خطأ، حاول تاني';
            }
        }

        window.addQuestion();
    </script>
</body>
</html>
